name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Ativa o cache automático do pip baseado no requirements.txt
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Adicione aqui dependências de teste (ex: pytest) se não estiverem no txt
          pip install pytest

      - name: Executar Testes
        run: |
          # Altere para o comando de teste do seu projeto
          pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test # Só inicia se todos os testes da Matrix passarem
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Iniciando lógica de deploy..."
          # Adicione aqui seus comandos de deploy (ex: SSH, AWS, Heroku, etc)
